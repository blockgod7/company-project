server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: groupware
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  api-prefix: /api/v1
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-long-random-value-for-local-development}
    access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:1800}
    refresh-token-validity-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}
  auth:
    refresh-cookie:
      name: ${REFRESH_TOKEN_COOKIE_NAME:refreshToken}
      path: ${REFRESH_TOKEN_COOKIE_PATH:/api/v1/auth}
      secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
      same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
  security:
    login-rate-limit:
      max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}
  file:
    storage-path: ${FILE_STORAGE_PATH:uploads}
    allowed-extensions: ${FILE_ALLOWED_EXTENSIONS:pdf,png,jpg,jpeg,gif,webp,txt,csv,xlsx,xls,doc,docx,ppt,pptx,hwp,hwpx,zip}
  approval:
    decision-due-hours: ${APPROVAL_DECISION_DUE_HOURS:72}
    reminder-fixed-delay-ms: ${APPROVAL_REMINDER_FIXED_DELAY_MS:300000}
    reminder-scheduler-tick-ms: ${APPROVAL_REMINDER_SCHEDULER_TICK_MS:60000}
